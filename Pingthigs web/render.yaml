services:
  - type: web
    name: pingthings-web
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DB_PATH
        value: /var/data/monitor.db
      - key: DEFAULT_CHECK_INTERVAL_SEC
        value: 60
      - key: REQUEST_TIMEOUT_MS
        value: 5000
      - key: SYNC_INTERVAL_SEC
        value: 15
      - key: MAX_HISTORY_LIMIT
        value: 200
    disk:
      name: pingthings-data
      mountPath: /var/data
      sizeGB: 1
